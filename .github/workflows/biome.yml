# Biome lint + format check on PRs to main
name: Biome

# Rapid force-pushes shouldn't queue up a backlog of lints.
concurrency:
  group: biome-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
      - run: biome ci .
