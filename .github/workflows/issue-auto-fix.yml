# Elixpo Auto Code — Auto-fix issues labeled "ELIXPO"
# Trigger: Add the "ELIXPO" label to an issue
# Whitelist: Elixpo org members (Circuit-Overtime, anwe-ch, elixpoo, ez-vivek)
#            + elixpoo user token triggering from triage
#
# The bot clones the repo, analyzes the issue, and either:
#   - Opens a PR with the fix (if code changes needed), or
#   - Comments on the issue (if it's a question/discussion)

name: Elixpo Auto Code

on:
  issues:
    types: [labeled]

concurrency:
  group: elixpo-auto-code-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-code:
    if: github.event.label.name == 'ELIXPO'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      POLLINATIONS_TOKEN: ${{ secrets.CI_POLLINATIONS_KEY }}
      AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
    steps:
      - name: Check Authorization
        id: whitelist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CI_AGENT_TOKEN }}
          script: |
            // Whitelist: Elixpo org members (plus elixpoo itself for bot-triggered labels)
            const whitelist = ['Circuit-Overtime', 'anwe-ch', 'elixpoo', 'ez-vivek'];
            const labeledBy = context.payload.sender.login;

            const isAuthorized = whitelist.includes(labeledBy);

            if (!isAuthorized) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'ELIXPO'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Sorry @${labeledBy}, only Elixpo org members can trigger Elixpo Auto Code by adding the \`ELIXPO\` label.`
              });
              core.setOutput('authorized', 'false');
            } else {
              core.setOutput('authorized', 'true');
            }

      - name: Setup Bun
        if: steps.whitelist.outputs.authorized == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup router + eyes reaction
        if: steps.whitelist.outputs.authorized == 'true'
        id: setup
        run: |
          # Add eyes reaction to the issue
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -f content=eyes || true

          # Router config: claude-fast via Pollinations, with thinking + web search routes
          mkdir -p $HOME/.claude-code-router
          cat > $HOME/.claude-code-router/config.json <<EOF
          {
            "LOG": false,
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "Providers": [
              {
                "name": "pollinations",
                "api_base_url": "https://gen.pollinations.ai/v1/chat/completions",
                "api_key": "${POLLINATIONS_TOKEN}",
                "models": ["claude-fast", "perplexity-fast", "kimi"]
              }
            ],
            "Router": {
              "default": "pollinations,claude-fast",
              "thinking": "pollinations,kimi",
              "webSearch": "pollinations,perplexity-fast"
            }
          }
          EOF

          # Start router
          bunx @musistudio/claude-code-router start &
          until curl -s http://localhost:3456 >/dev/null; do sleep 0.5; done
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.whitelist.outputs.authorized == 'true'
        with:
          fetch-depth: 0
          repository: ${{ github.repository }}
          token: ${{ secrets.CI_AGENT_TOKEN }}

      - uses: anthropics/claude-code-action@v1
        if: steps.whitelist.outputs.authorized == 'true'
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          GIT_AUTHOR_NAME: "elixpoo"
          GIT_AUTHOR_EMAIL: "269200728+elixpoo@users.noreply.github.com"
          GIT_COMMITTER_NAME: "elixpoo"
          GIT_COMMITTER_EMAIL: "269200728+elixpoo@users.noreply.github.com"
        with:
          anthropic_api_key: "ccr-pollinations"
          show_full_output: true
          github_token: ${{ secrets.CI_AGENT_TOKEN }}
          prompt: |
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            You are elixpo, a developer on the Elixpo team. Never mention Claude,
            Claude Code, AI, or LLMs — you are just a team member. Be casual,
            concise, and human.

            ### Step 0 — Read the issue
            Read the issue body and comments:
              gh issue view ${{ github.event.issue.number }} --comments

            ### Step 1 — Decide
            - If this is a question, discussion, or clearly doesn't need code changes:
              post a reply with `gh issue comment ${{ github.event.issue.number }}` and STOP.
              Do not open a PR for pure discussion.
            - Otherwise, treat this as real development work and continue to Step 2.

            ### Step 2 — Create a draft PR FIRST (before any work)
            This is the PR-first flow. Create the PR immediately so the issue's
            "Development" section shows the linked PR, then do all work inside it.

            1. Create the branch:
                 BRANCH="elixpo/issue-${{ github.event.issue.number }}"
                 git checkout -b "$BRANCH"
            2. Make an initial empty commit so there's something to push:
                 git commit --allow-empty -m "elixpo: begin work on #${{ github.event.issue.number }}"
                 git push -u origin "$BRANCH"
            3. Open a draft PR linked to the issue:
                 gh pr create --draft \
                   --title "[ELIXPO] ${{ github.event.issue.title }}" \
                   --body $'Fixes #${{ github.event.issue.number }}\n\n### Plan\n- [ ] Understand the problem\n- [ ] Implement changes\n- [ ] Verify build / tests\n\n### Progress\n_I will update this PR as I make progress._' \
                   --head "$BRANCH" --base main
            4. Capture the PR number:
                 PR_NUM=$(gh pr view --json number -q .number)
            5. Post a short acknowledgement on the ISSUE pointing to the PR:
                 gh issue comment ${{ github.event.issue.number }} --body "On it. Development is happening in #${PR_NUM}."

            ### Step 3 — Do all the work inside the PR
            From now on, every update goes on the PR, not the issue.
              - Make code changes on the branch.
              - Commit with clear messages.
              - Push after each meaningful change.
              - Post progress notes with `gh pr comment ${PR_NUM} --body "..."` — e.g. "Investigated X, found Y", "Applied fix to file Z", "CI passed locally".
              - Update the PR description as the plan evolves (`gh pr edit ${PR_NUM} --body "..."`).

            ### Step 4 — Finish
            When the work is complete and you're confident the change is correct:
              - Mark the PR ready for review: `gh pr ready ${PR_NUM}`
              - Post a final PR comment summarizing what changed.
            Do NOT merge the PR yourself — leave that to the maintainers.

            ### Rules
            - Stay within the scope of the issue. If you discover a separate problem,
              note it in a PR comment but do not fix it in this PR.
            - Do not push directly to main. All work goes through the PR branch.
            - If you hit a blocker you cannot resolve, post a comment on the PR
              explaining what's blocking you and stop — do not force a bad fix.
          additional_permissions: |
            actions: read
