# Instant acknowledgement when @elixpoo is tagged.
# Runs in parallel with the main pr-review-request workflow so the user
# sees a reaction within ~5 seconds, even though the router-based workflow
# takes 30-60s to spin up.
#
# Behavior:
#   - Detects the @elixpoo mention (comment, review-comment, review, issue body)
#   - Picks a random short acknowledgement from 5 variants
#   - Edits the triggering content to append the ack as a blockquote at the end

name: Elixpoo Ack

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

jobs:
  ack:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@elixpoo') && !contains(github.event.comment.body, '> @elixpoo')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@elixpoo')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@elixpoo')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@elixpoo') || contains(github.event.issue.title, '@elixpoo')))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Append acknowledgement blockquote
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CI_AGENT_TOKEN }}
          script: |
            // Skip if the triggering actor is elixpoo itself (avoid loops)
            if (context.actor === 'elixpoo') {
              console.log('Triggered by elixpoo itself, skipping.');
              return;
            }

            const acks = [
              "Hold up! Looking into it.",
              "Just a minute, reading the comment.",
              "On my way — give me a sec.",
              "Pulling up the context, be right with you.",
              "One moment — scanning things now."
            ];
            const ack = acks[Math.floor(Math.random() * acks.length)];
            const marker = "<!-- elixpoo-ack -->";
            const blockquote = `\n\n> ${ack}\n${marker}`;

            const { owner, repo } = context.repo;

            async function appendToBody(currentBody, editFn) {
              const body = currentBody || "";
              if (body.includes(marker)) {
                console.log("Ack marker already present, skipping.");
                return;
              }
              await editFn(body + blockquote);
              console.log(`Appended ack: ${ack}`);
            }

            if (context.eventName === 'issue_comment') {
              const id = context.payload.comment.id;
              await appendToBody(context.payload.comment.body, (body) =>
                github.rest.issues.updateComment({ owner, repo, comment_id: id, body })
              );
            } else if (context.eventName === 'pull_request_review_comment') {
              const id = context.payload.comment.id;
              await appendToBody(context.payload.comment.body, (body) =>
                github.rest.pulls.updateReviewComment({ owner, repo, comment_id: id, body })
              );
            } else if (context.eventName === 'pull_request_review') {
              const pullNumber = context.payload.pull_request.number;
              const reviewId = context.payload.review.id;
              await appendToBody(context.payload.review.body, (body) =>
                github.rest.pulls.updateReview({ owner, repo, pull_number: pullNumber, review_id: reviewId, body })
              );
            } else if (context.eventName === 'issues') {
              const issueNumber = context.payload.issue.number;
              await appendToBody(context.payload.issue.body, (body) =>
                github.rest.issues.update({ owner, repo, issue_number: issueNumber, body })
              );
            }
