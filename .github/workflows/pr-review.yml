# @elixpo PR review — triggered by mentioning @elixpo in a PR comment
name: PR Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@elixpo')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Review PR
        env:
          AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          POLLINATIONS_KEY: ${{ secrets.CI_POLLINATIONS_KEY }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/pr_review.py
