# Updates the repo-context artifact on every PR merge to main.
# This artifact is used by AI-powered CI (issue description, PR review, etc.)
# to give the LLM full context of what the repo is and what's changed recently.

name: Update Repo Context Artifact

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/build_artifact.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-context
          path: .elixpo-context/
          retention-days: 90
          overwrite: true
