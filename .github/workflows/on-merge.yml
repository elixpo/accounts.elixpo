# On PR merge: create gist digest, close linked issues, check for README update
name: On Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  post-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gist digest + close issues
        env:
          AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          POLLINATIONS_KEY: ${{ secrets.CI_POLLINATIONS_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/merge_gist.py

      - name: Check for README update
        env:
          AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          POLLINATIONS_KEY: ${{ secrets.CI_POLLINATIONS_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/update_readme.py
