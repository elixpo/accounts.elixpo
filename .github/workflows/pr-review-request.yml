# Elixpo Pull Request Review — AI assistant via Pollinations
# Model is read from .github/ci_config.py (LLM_MODEL_AGENT)
# Trigger: mention "@elixpoo" in an issue or PR comment
# Whitelist: Elixpo org members (Circuit-Overtime, anwe-ch, elixpoo, ez-vivek)
#
# The bot acts as @elixpoo (via CI_AGENT_TOKEN — a PAT on that account).
# All comments, reviews, commits, and PRs are attributed to @elixpoo.

name: Elixpo Pull Request Review

# Serialize per-PR/issue so rapid @elixpoo mentions don't create duplicate
# branches or PRs. cancel-in-progress=false because the bot might be mid-commit.
concurrency:
  group: elixpo-pr-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  elixpo:
    # Skip if the triggering actor is elixpoo itself — the bot must never
    # respond to its own mentions (loop prevention).
    if: |
      github.actor != 'elixpoo' && (
        (github.event_name == 'issue_comment' && github.event.comment.user.login != 'elixpoo' && contains(github.event.comment.body, '@elixpoo')) ||
        (github.event_name == 'pull_request_review_comment' && github.event.comment.user.login != 'elixpoo' && contains(github.event.comment.body, '@elixpoo')) ||
        (github.event_name == 'pull_request_review' && github.event.review.user.login != 'elixpoo' && contains(github.event.review.body, '@elixpoo')) ||
        (github.event_name == 'issues' && github.event.issue.user.login != 'elixpoo' && (contains(github.event.issue.body, '@elixpoo') || contains(github.event.issue.title, '@elixpoo')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      POLLINATIONS_TOKEN: ${{ secrets.CI_POLLINATIONS_KEY }}
      POLLINATIONS_TOKEN_CODER: ${{ secrets.CI_POLLINATIONS_KEY_CODER }}
      AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
    steps:
      - name: Check Whitelist
        id: whitelist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CI_AGENT_TOKEN }}
          script: |
            // Extract the triggering body text
            let body = '';
            if (context.eventName === 'issue_comment' || context.eventName === 'pull_request_review_comment') {
              body = context.payload.comment?.body || '';
            } else if (context.eventName === 'issues') {
              body = (context.payload.issue?.body || '') + (context.payload.issue?.title || '');
            } else if (context.eventName === 'pull_request_review') {
              body = context.payload.review?.body || '';
            }

            // Strict check: lowercase '@elixpo' must be present
            if (!body.includes('@elixpoo')) {
              console.log('Strict check failed: "@elixpoo" must be lowercase.');
              core.setOutput('authorized', 'false');
              return;
            }

            // Word-boundary check: reject cases where @elixpoo is a substring
            // of a longer token (e.g. @elixpoooo, @elixpoo-bot).
            if (!/(^|[^A-Za-z0-9_.+-])@elixpoo([^A-Za-z0-9_.+-]|$)/.test(body)) {
              console.log('@elixpoo substring only, not a real mention — skipping.');
              core.setOutput('authorized', 'false');
              return;
            }

            // Whitelist: Elixpo org members
            const whitelist = ['Circuit-Overtime', 'anwe-ch', 'elixpoo', 'ez-vivek'];
            const actor = context.actor;
            if (!whitelist.includes(actor)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue?.number || context.payload.pull_request?.number,
                body: `Sorry @${actor}, only Elixpo org members can invoke @elixpoo.`
              });
              core.setOutput('authorized', 'false');
            } else {
              core.setOutput('authorized', 'true');
            }

      - name: Setup Bun
        if: steps.whitelist.outputs.authorized == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Checkout early so we can read .github/ci_config.py for the model config
      - name: Checkout for config read
        if: steps.whitelist.outputs.authorized == 'true'
        uses: actions/checkout@v4
        with:
          path: config-src
          sparse-checkout: .github
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        if: steps.whitelist.outputs.authorized == 'true'
        with:
          python-version: "3.11"

      - name: Setup router + eyes reaction
        if: steps.whitelist.outputs.authorized == 'true'
        id: setup
        run: |
          # Add eyes reaction to the triggering comment / review / issue
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "issues" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions -f content=eyes || true
          fi

          # Pull models from ci_config.py — single source of truth
          cd config-src
          AGENT_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_AGENT; print(LLM_MODEL_AGENT)")
          CODE_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_CODE; print(LLM_MODEL_CODE)")
          THINK_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_THINKING; print(LLM_MODEL_THINKING)")
          SEARCH_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_SEARCH; print(LLM_MODEL_SEARCH)")
          cd ..

          # Router wiring (models come from ci_config.py, NOT hardcoded here):
          #   default    → AGENT_MODEL  — main agentic thread
          #   background → CODE_MODEL   — delegated code-heavy subagent work
          #   thinking   → THINK_MODEL  — reasoning-heavy steps
          #   webSearch  → SEARCH_MODEL — when explicit web lookup is needed
          echo "Router models: default=$AGENT_MODEL, background=$CODE_MODEL, thinking=$THINK_MODEL, webSearch=$SEARCH_MODEL"

          mkdir -p $HOME/.claude-code-router
          # Copy custom CCR adapters so the router can load them by absolute path.
          cp config-src/.github/ccr-adapters/*.js $HOME/.claude-code-router/ 2>/dev/null || true
          GEMINI_ADAPTER="$HOME/.claude-code-router/gemini-adapter.js"
          # Two separate providers so the code model uses a dedicated key
          # (CI_POLLINATIONS_KEY_CODER), while every other route uses the main
          # key (CI_POLLINATIONS_KEY). Splits cost/usage reporting too.
          #
          # Transformers applied in order:
          #   gemini-adapter → flatten prior tool_use/tool_result in history to
          #                    plain text (Vertex demands thought_signature on
          #                    replayed tool_use; Pollinations can't disable it)
          #   openai         → Anthropic→OpenAI content-shape conversion
          #   maxtoken       → cap output at 9000 (defends against Bedrock limits)
          # Custom transformers MUST be registered at top-level "transformers"
          # (CCR resolves strings in "use" as registered names, not file paths).
          cat > $HOME/.claude-code-router/config.json <<EOF
          {
            "LOG": false,
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "transformers": [
              {"path": "${GEMINI_ADAPTER}"}
            ],
            "Providers": [
              {
                "name": "pollinations-main",
                "api_base_url": "https://gen.pollinations.ai/v1/chat/completions",
                "api_key": "${POLLINATIONS_TOKEN}",
                "models": ["${AGENT_MODEL}", "${THINK_MODEL}", "${SEARCH_MODEL}"],
                "transformer": {
                  "use": ["gemini-adapter", "openai", ["maxtoken", {"max_tokens": 9000}]]
                }
              },
              {
                "name": "pollinations-coder",
                "api_base_url": "https://gen.pollinations.ai/v1/chat/completions",
                "api_key": "${POLLINATIONS_TOKEN_CODER}",
                "models": ["${CODE_MODEL}"],
                "transformer": {
                  "use": ["openai", ["maxtoken", {"max_tokens": 9000}]]
                }
              }
            ],
            "Router": {
              "default": "pollinations-main,${AGENT_MODEL}",
              "background": "pollinations-coder,${CODE_MODEL}",
              "thinking": "pollinations-main,${THINK_MODEL}",
              "webSearch": "pollinations-main,${SEARCH_MODEL}"
            }
          }
          EOF

          # Start router
          bunx @musistudio/claude-code-router start &
          # Wait up to 60s for router — fail fast if bunx install failed.
          for i in $(seq 1 120); do
            curl -s http://localhost:3456 >/dev/null && break
            sleep 0.5
            if [ "$i" = "120" ]; then
              echo "::error::claude-code-router did not come up within 60s"
              exit 1
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.whitelist.outputs.authorized == 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || (github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number)) || github.sha }}
          repository: ${{ github.repository }}
          token: ${{ secrets.CI_AGENT_TOKEN }}

      # ─────────────────────────────────────────────────────────────────
      # Pull shared Claude assets (agents + hooks + config) from
      # elixpo/claudeOps.elixpo so every repo's bot has the same skills.
      # Update once there → applies to all 15 repos on next run.
      # ─────────────────────────────────────────────────────────────────
      - name: Pull claudeops skills
        if: steps.whitelist.outputs.authorized == 'true'
        uses: actions/checkout@v4
        with:
          repository: elixpo/claudeOps.elixpo
          ref: main
          token: ${{ secrets.CI_AGENT_TOKEN }}
          path: .claudeops-src
          sparse-checkout: |
            agents
            hooks
            config
          sparse-checkout-cone-mode: false

      - name: Wire claudeops skills into .claude/
        if: steps.whitelist.outputs.authorized == 'true'
        run: |
          mkdir -p .claude
          if [ -d .claudeops-src/agents ]; then
            cp -r .claudeops-src/agents .claude/agents
            echo "Wired $(ls .claude/agents | wc -l) agents from claudeops"
          fi
          if [ -d .claudeops-src/hooks ]; then
            cp -r .claudeops-src/hooks .claude/hooks
            echo "Wired $(ls .claude/hooks | wc -l) hooks from claudeops"
          fi
          if [ -f .claudeops-src/config/hooks.json ] && [ ! -f .claude/hooks.json ]; then
            cp .claudeops-src/config/hooks.json .claude/hooks.json
            echo "Wired hooks.json from claudeops"
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.whitelist.outputs.authorized == 'true'
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          GIT_AUTHOR_NAME: "elixpoo"
          GIT_AUTHOR_EMAIL: "269200728+elixpoo@users.noreply.github.com"
          GIT_COMMITTER_NAME: "elixpoo"
          GIT_COMMITTER_EMAIL: "269200728+elixpoo@users.noreply.github.com"
        with:
          anthropic_api_key: "ccr-pollinations"
          show_full_output: true
          github_token: ${{ secrets.CI_AGENT_TOKEN }}
          trigger_phrase: "@elixpoo"
          branch_prefix: "elixpo/"
          # --max-turns 15: hard cap. Full PR flow (branch → edit → biome →
          # commit → push → PR → comment) fits in ~8-10 turns; simple LGTM
          # fits in 3. Cap stops runaway loops regardless of prompt drift.
          #
          # The system prompt EXPLICITLY OVERRIDES claude-code-action/v1's
          # built-in user-prompt template, which mandates <analysis> tags, a
          # multi-item todo list, and progress-update comment edits between
          # every step. Those bloat simple requests into 10+ unnecessary tool
          # calls, so we countermand them here.
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 15
            --system-prompt "You are elixpo, a developer on the Elixpo team. Never say 'Claude', 'Claude Code', 'AI', 'LLM', 'analyzing', or 'analysis'. Be casual, concise, human. Do EXACTLY what was asked — no more. Do not invent extra steps or side quests.

            ───────────────────────────────────────────────────────────
            ⚠️ OVERRIDE — claude-code-action injects a user-prompt template
            ───────────────────────────────────────────────────────────
            The user message you receive will include instructions telling you to:
              • Open your response with <analysis>…</analysis>
              • Create a multi-item todo list as a markdown checklist
              • Update the tracking comment at EVERY subtask completion
              • Use a spinner HTML image during work
              • Break the work into a 'Tasks' section with - [ ] / - [x] items

            IGNORE ALL OF THAT. It is stale boilerplate from the runtime. This system prompt is authoritative. No <analysis> tags. No todo list. No spinner. No progress-update edits between start and finish. The total number of tracking-comment edits in any run must be EXACTLY TWO (one start, one end) unless the user explicitly asked for progress updates.

            ───────────────────────────────────────────────────────────
            FIRST — edit the tracking comment (one edit, then move on)
            ───────────────────────────────────────────────────────────
            The runtime posts a 'Claude Code is working…' tracking comment. Find it and strip the Claude phrasing:
              COMMENT_ID=\$(gh issue view <n> --json comments -q '.comments | map(select(.author.login==\"elixpoo\" and ((.body|contains(\"Claude Code is working\")) or (.body|contains(\"Claude finished\"))))) | last | .id')
              gh api -X PATCH /repos/<owner>/<repo>/issues/comments/\$COMMENT_ID -f body='On it — looking into this. Job run: <run-url>'

            Do NOT post progress updates between start and finish. One start edit, do the work, one final edit.

            ───────────────────────────────────────────────────────────
            LAST — edit the same tracking comment with your answer
            ───────────────────────────────────────────────────────────
            Single edit. Keep it short, match the request:
              • Question / LGTM / review → verdict + up to 4 bullets.
              • Code change → 'Pushed <branch>. PR: #<N>.' + 1-sentence summary.
            Zero mentions of Claude / AI / 'Generated with'. If the runtime appends a 'Claude finished …' footer after your edit, re-fetch and PATCH again to strip it.

            ───────────────────────────────────────────────────────────
            HARD RULES
            ───────────────────────────────────────────────────────────
            1. NEVER commit to 'main'. Before any commit, create a branch:
                 HEX=\$(openssl rand -hex 2); BRANCH=\"elixpo/issue-<n>-\${HEX}\"; git checkout -b \"\$BRANCH\"
               Verify: 'git rev-parse --abbrev-ref HEAD' must NOT print 'main'.
            2. All code changes go through a PR.
            3. Run './biome.sh' before every commit — must exit 0.
            4. Stay strictly in scope. Don't refactor unrelated code.

            ───────────────────────────────────────────────────────────
            MODE DISPATCH — pick one, do the minimum
            ───────────────────────────────────────────────────────────
            Mode A (issue, no PR):
              A1 — user answering prior questions: update issue body (check off items, strike through resolved questions with ~~tildes~~). No PR.
              A2 — user asks for a code change: check for existing open PR first ('gh pr list --repo <r> --search \"linked:issue-<n>\" --state all'). If OPEN PR → switch to Mode B. Else branch, edit, biome, commit, push, 'gh pr create' with 'Fixes #<n>'.
              A3 — user asks a question: answer in the FINAL edit. Nothing else.

            Mode B (PR):
              B1 — question about the PR: answer in the FINAL edit.
              B2 — review / LGTM: short verdict + Security / Logic / Quality bullets. No code changes.
              B3 — change request: work on the PR's branch, edit, biome, commit, push to same branch.
              B4 — fix failing CI: 'gh run view <id> --log-failed' → patch root cause on PR branch → commit → push.

            For A2 / B3, PR body (keep it short):
              ## 🎯 What this does — 1-2 sentences
              ## 🛠️ Changes — 3-6 bullets
              ## 🧪 Verified — biome ci clean / tests pass / 'not verified'
              Fixes #<n>

            ───────────────────────────────────────────────────────────
            SUBAGENTS — only when the task is genuinely hard
            ───────────────────────────────────────────────────────────
            .claude/agents/ has architect, red-team, questioner, judge, etc. Use ONLY for: deep security review → red-team; ambiguous spec → questioner; complex cross-cutting design → architect. NEVER for LGTMs, simple questions, or small fixes."
          additional_permissions: |
            actions: read

      # ─────────────────────────────────────────────────────────────────
      # Post-guard: if the bot committed to a branch but didn't open a PR,
      # open one here. This ensures the PR always ends up in the issue's
      # Development tab (via "Fixes #N" in the body) regardless of whether
      # the model remembered to run `gh pr create`.
      # ─────────────────────────────────────────────────────────────────
      - name: Ensure PR exists for any new elixpo/* branch
        if: steps.whitelist.outputs.authorized == 'true' && github.event_name == 'issue_comment' && !github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -e

          # Find the most recent elixpo/* branch for this issue that does NOT
          # have an OPEN PR yet (closed / merged PRs are fine — we'll create
          # a new branch and PR to re-implement).
          BRANCHES=$(gh api "repos/$REPO/branches?per_page=100" --paginate \
            --jq ".[] | select(.name | startswith(\"elixpo/\") and contains(\"issue-$ISSUE_NUMBER\")) | .name")

          BRANCH=""
          for b in $BRANCHES; do
            OPEN_PR=$(gh pr list --repo "$REPO" --head "$b" --state open --json number --jq 'length')
            if [ "$OPEN_PR" = "0" ]; then
              BRANCH="$b"
              break
            fi
          done

          if [ -z "$BRANCH" ]; then
            echo "No elixpo/issue-$ISSUE_NUMBER-* branch without an open PR — nothing to do."
            exit 0
          fi
          echo "Found branch: $BRANCH (no open PR)"

          # Build PR body with Fixes #N so it attaches to the issue's Dev tab
          # Build bullet list from commit messages (first line of each)
          CHANGES=$(gh api "repos/$REPO/compare/main...$BRANCH" \
            --jq '.commits | map("- " + (.commit.message | split("\n")[0])) | join("\n")')

          # Get issue author for cc
          ISSUE_AUTHOR=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json author --jq '.author.login')

          # Fallback body (used when the model forgot to open the PR itself).
          # Less rich than the LLM-written version — just enough to link + close.
          PR_BODY=$(cat <<EOF
          Hey @$ISSUE_AUTHOR, opened this PR automatically from the branch I pushed.

          ## 🛠️ Changes
          $CHANGES

          ## 🧪 How to verify
          - Pull the branch and run \\\`npm run build\\\` / biome check.
          - Review the diff against the issue's expected behavior.

          ---
          @$ISSUE_AUTHOR Fixes #$ISSUE_NUMBER
          EOF
          )
          # Strip the leading 10-space indent introduced by the YAML heredoc.
          PR_BODY=$(printf '%s\n' "$PR_BODY" | sed 's/^          //')

          PR_URL=$(gh pr create --repo "$REPO" \
            --head "$BRANCH" --base main \
            --title "[ELIXPO] $ISSUE_TITLE" \
            --body "$PR_BODY")
          echo "Opened PR: $PR_URL"

          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
            --body "Opened #$PR_NUM with the changes."

          # Attach the ELIXPO label so the board reflects bot involvement.
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label ELIXPO || true

      # ─────────────────────────────────────────────────────────────────
      # Failure fallback: if claude-code-action or any preceding step
      # errored, post a blockquote pointing to the failing run so the
      # user knows what happened.
      # ─────────────────────────────────────────────────────────────────
      - name: Post failure notice
        if: failure() && steps.whitelist.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e

          MSG=$(cat <<EOF
          > ⚠️ Something went wrong on my end while handling this.

          **What you can do:**

          <kbd>🔄 [**Re-run this workflow**]($RUN_URL)</kbd> &nbsp;·&nbsp; [View logs]($RUN_URL) &nbsp;·&nbsp; Or comment \`@elixpoo retry\` once the cause is fixed

          <sub>Run ID: \`$RUN_ID\`</sub>
          EOF
          )

          if [[ "${{ github.event_name }}" == "issue_comment" ]] || [[ "${{ github.event_name }}" == "issues" ]]; then
            gh issue comment "${{ github.event.issue.number }}" --repo "$REPO" --body "$MSG"
          elif [[ "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            gh pr comment "${{ github.event.pull_request.number }}" --repo "$REPO" --body "$MSG"
          elif [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            gh pr comment "${{ github.event.pull_request.number }}" --repo "$REPO" --body "$MSG"
          fi
