# Elixpo Pull Request Review — AI assistant via Pollinations
# Model is read from .github/ci_config.py (LLM_MODEL_AGENT)
# Trigger: mention "@elixpoo" in an issue or PR comment
# Whitelist: Elixpo org members (Circuit-Overtime, anwe-ch, elixpoo, ez-vivek)
#
# The bot acts as @elixpoo (via CI_AGENT_TOKEN — a PAT on that account).
# All comments, reviews, commits, and PRs are attributed to @elixpoo.

name: Elixpo Pull Request Review

# Serialize per-PR/issue so rapid @elixpoo mentions don't create duplicate
# branches or PRs. cancel-in-progress=false because the bot might be mid-commit.
concurrency:
  group: elixpo-pr-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  elixpo:
    # Skip if the triggering actor is elixpoo itself — the bot must never
    # respond to its own mentions (loop prevention).
    if: |
      github.actor != 'elixpoo' && (
        (github.event_name == 'issue_comment' && github.event.comment.user.login != 'elixpoo' && contains(github.event.comment.body, '@elixpoo')) ||
        (github.event_name == 'pull_request_review_comment' && github.event.comment.user.login != 'elixpoo' && contains(github.event.comment.body, '@elixpoo')) ||
        (github.event_name == 'pull_request_review' && github.event.review.user.login != 'elixpoo' && contains(github.event.review.body, '@elixpoo')) ||
        (github.event_name == 'issues' && github.event.issue.user.login != 'elixpoo' && (contains(github.event.issue.body, '@elixpoo') || contains(github.event.issue.title, '@elixpoo')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      POLLINATIONS_TOKEN: ${{ secrets.CI_POLLINATIONS_KEY }}
      AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
    steps:
      - name: Check Whitelist
        id: whitelist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CI_AGENT_TOKEN }}
          script: |
            // Extract the triggering body text
            let body = '';
            if (context.eventName === 'issue_comment' || context.eventName === 'pull_request_review_comment') {
              body = context.payload.comment?.body || '';
            } else if (context.eventName === 'issues') {
              body = (context.payload.issue?.body || '') + (context.payload.issue?.title || '');
            } else if (context.eventName === 'pull_request_review') {
              body = context.payload.review?.body || '';
            }

            // Strict check: lowercase '@elixpo' must be present
            if (!body.includes('@elixpoo')) {
              console.log('Strict check failed: "@elixpoo" must be lowercase.');
              core.setOutput('authorized', 'false');
              return;
            }

            // Word-boundary check: reject cases where @elixpoo is a substring
            // of a longer token (e.g. @elixpoooo, @elixpoo-bot).
            if (!/(^|[^A-Za-z0-9_.+-])@elixpoo([^A-Za-z0-9_.+-]|$)/.test(body)) {
              console.log('@elixpoo substring only, not a real mention — skipping.');
              core.setOutput('authorized', 'false');
              return;
            }

            // Whitelist: Elixpo org members
            const whitelist = ['Circuit-Overtime', 'anwe-ch', 'elixpoo', 'ez-vivek'];
            const actor = context.actor;
            if (!whitelist.includes(actor)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue?.number || context.payload.pull_request?.number,
                body: `Sorry @${actor}, only Elixpo org members can invoke @elixpoo.`
              });
              core.setOutput('authorized', 'false');
            } else {
              core.setOutput('authorized', 'true');
            }

      - name: Setup Bun
        if: steps.whitelist.outputs.authorized == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Checkout early so we can read .github/ci_config.py for the model config
      - name: Checkout for config read
        if: steps.whitelist.outputs.authorized == 'true'
        uses: actions/checkout@v4
        with:
          path: config-src
          sparse-checkout: .github
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        if: steps.whitelist.outputs.authorized == 'true'
        with:
          python-version: "3.11"

      - name: Setup router + eyes reaction
        if: steps.whitelist.outputs.authorized == 'true'
        id: setup
        run: |
          # Add eyes reaction to the triggering comment / review / issue
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "issues" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions -f content=eyes || true
          fi

          # Pull models from ci_config.py — single source of truth
          cd config-src
          AGENT_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_AGENT; print(LLM_MODEL_AGENT)")
          CODE_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_CODE; print(LLM_MODEL_CODE)")
          THINK_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_THINKING; print(LLM_MODEL_THINKING)")
          SEARCH_MODEL=$(python3 -c "import sys; sys.path.insert(0,'.github'); from ci_config import LLM_MODEL_SEARCH; print(LLM_MODEL_SEARCH)")
          cd ..

          # Router wiring (models come from ci_config.py, NOT hardcoded here):
          #   default    → AGENT_MODEL  — main agentic thread
          #   background → CODE_MODEL   — delegated code-heavy subagent work
          #   thinking   → THINK_MODEL  — reasoning-heavy steps
          #   webSearch  → SEARCH_MODEL — when explicit web lookup is needed
          echo "Router models: default=$AGENT_MODEL, background=$CODE_MODEL, thinking=$THINK_MODEL, webSearch=$SEARCH_MODEL"

          mkdir -p $HOME/.claude-code-router
          # maxtoken transformer caps outgoing max_tokens to 9000, because
          # nova-fast (Bedrock Nova Micro) rejects requests >10000 output tokens.
          # This stays under the limit while still giving enough room for the
          # stage-by-stage comments + final rich summary.
          cat > $HOME/.claude-code-router/config.json <<EOF
          {
            "LOG": false,
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "Providers": [
              {
                "name": "pollinations",
                "api_base_url": "https://gen.pollinations.ai/v1/chat/completions",
                "api_key": "${POLLINATIONS_TOKEN}",
                "models": ["${AGENT_MODEL}", "${CODE_MODEL}", "${THINK_MODEL}", "${SEARCH_MODEL}"],
                "transformer": {
                  "use": [["maxtoken", {"max_tokens": 9000}]]
                }
              }
            ],
            "Router": {
              "default": "pollinations,${AGENT_MODEL}",
              "background": "pollinations,${CODE_MODEL}",
              "thinking": "pollinations,${THINK_MODEL}",
              "webSearch": "pollinations,${SEARCH_MODEL}"
            }
          }
          EOF

          # Start router
          bunx @musistudio/claude-code-router start &
          # Wait up to 60s for router — fail fast if bunx install failed.
          for i in $(seq 1 120); do
            curl -s http://localhost:3456 >/dev/null && break
            sleep 0.5
            if [ "$i" = "120" ]; then
              echo "::error::claude-code-router did not come up within 60s"
              exit 1
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.whitelist.outputs.authorized == 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || (github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number)) || github.sha }}
          repository: ${{ github.repository }}
          token: ${{ secrets.CI_AGENT_TOKEN }}

      # ─────────────────────────────────────────────────────────────────
      # Pull shared Claude assets (agents + hooks + config) from
      # elixpo/claudeOps.elixpo so every repo's bot has the same skills.
      # Update once there → applies to all 15 repos on next run.
      # ─────────────────────────────────────────────────────────────────
      - name: Pull claudeops skills
        if: steps.whitelist.outputs.authorized == 'true'
        uses: actions/checkout@v4
        with:
          repository: elixpo/claudeOps.elixpo
          ref: main
          token: ${{ secrets.CI_AGENT_TOKEN }}
          path: .claudeops-src
          sparse-checkout: |
            agents
            hooks
            config
          sparse-checkout-cone-mode: false

      - name: Wire claudeops skills into .claude/
        if: steps.whitelist.outputs.authorized == 'true'
        run: |
          mkdir -p .claude
          if [ -d .claudeops-src/agents ]; then
            cp -r .claudeops-src/agents .claude/agents
            echo "Wired $(ls .claude/agents | wc -l) agents from claudeops"
          fi
          if [ -d .claudeops-src/hooks ]; then
            cp -r .claudeops-src/hooks .claude/hooks
            echo "Wired $(ls .claude/hooks | wc -l) hooks from claudeops"
          fi
          if [ -f .claudeops-src/config/hooks.json ] && [ ! -f .claude/hooks.json ]; then
            cp .claudeops-src/config/hooks.json .claude/hooks.json
            echo "Wired hooks.json from claudeops"
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.whitelist.outputs.authorized == 'true'
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          GIT_AUTHOR_NAME: "elixpoo"
          GIT_AUTHOR_EMAIL: "269200728+elixpoo@users.noreply.github.com"
          GIT_COMMITTER_NAME: "elixpoo"
          GIT_COMMITTER_EMAIL: "269200728+elixpoo@users.noreply.github.com"
        with:
          anthropic_api_key: "ccr-pollinations"
          show_full_output: true
          github_token: ${{ secrets.CI_AGENT_TOKEN }}
          trigger_phrase: "@elixpoo"
          branch_prefix: "elixpo/"
          claude_args: |
            --permission-mode bypassPermissions
            --system-prompt "You are elixpo, a developer on the Elixpo team. Never mention Claude, Claude Code, AI, or LLMs — you are just a team member. Be casual, concise, and human. Use bullet points. No verbose explanations. Focus on security, correctness, edge cases, and project conventions.

            ═══════════════════════════════════════════════════════════════
            FIRST ACTION — every invocation, before anything else
            ═══════════════════════════════════════════════════════════════
            The runtime posts a default 'Claude Code is working...' tracking comment as your first comment, and on completion it appends a 'Claude finished ... [Create PR ➔]' footer with 'Generated with Claude Code'. All of that phrasing is wrong for this repo — we never reference Claude or AI.

            Your FIRST action every invocation:
              1. Find the tracking comment (most recent comment by @elixpoo on this issue/PR containing 'Claude Code is working' or 'analyze this and get back'):
                   COMMENT_ID=\$(gh issue view <n> --json comments -q '.comments | map(select(.author.login==\"elixpoo\" and ((.body|contains(\"Claude Code is working\")) or (.body|contains(\"Claude finished\"))))) | last | .id')
              2. Edit it to something on-brand:
                   gh api -X PATCH /repos/<owner>/<repo>/issues/comments/\$COMMENT_ID -f body='On it — looking into this now. Job run: <run-url>'

            AS YOU WORK — STAGE-BY-STAGE PROGRESS UPDATES:
              You MUST edit the SAME tracking comment at each of these checkpoints. Do NOT post new comments.
              Each edit replaces the body with a short status block showing where you are.

              Stage format (use this exact layout — IMPORTANT: every intermediate
              update MUST end with the '> Still working on it.' blockquote so the
              user knows the bot is alive):

                ### 🔄 Working
                **Current step:** <what you're doing right now>

                **Progress:**
                - [x] <completed step>
                - [x] <completed step>
                - [ ] <current step>
                - [ ] <upcoming step>

                <one optional sentence of detail about the current step>

                _Job run: <run-url>_

                > Still working on it.

              Required checkpoints (edit the comment at EACH of these):
                1. Starting out:                'Reading the issue + repo context'
                2. After context gathered:     'Scoping the change — plan: <1-line plan>'
                3. Before any code edits:      'Making changes to <file path(s)>'
                4. After edits, before biome:  'Changes done. Running biome check'
                5. After biome passes:         'Biome clean. Committing + pushing to <branch>'
                6. After git push:             'Pushed. Opening PR'
                7. After PR open:              'PR #<N> opened. Posting summary' (then move to FINAL ACTION)

              Each update should take one 'gh api -X PATCH' call. Keep it snappy.

            FINAL ACTION — before returning control:
              Replace the tracking comment with a rich completion summary. Format EXACTLY:

                ### ✅ Done
                <1-2 sentence plain-English summary of what was accomplished>

                ### 📝 Changes
                - <file path>: <what changed and why>
                - <file path>: <what changed and why>
                <up to 6 bullets; if no code changes, omit this section>

                ### 🔗 Links
                - Pull request: #<N> (if one was opened)
                - Branch: \`<branch-name>\`
                - Workflow run: <run-url>

                ### 🧪 Verification
                - <how the change was validated, e.g. 'biome ci clean', 'tests pass locally', 'manual sanity check of X'>
                - <if nothing was verified, say so: 'not verified — please review before merging'>

              Update via:
                gh api -X PATCH /repos/<owner>/<repo>/issues/comments/\$COMMENT_ID -f body=\"\$FINAL_BODY\"

              If the default 'Claude finished ... Generated with Claude Code' footer was appended by the runtime after your edit, re-fetch the comment body, strip anything containing 'Claude' or 'Generated with', and PATCH again. The final visible comment must contain zero mentions of Claude, Claude Code, AI, LLM, or 'Generated with'.

            Never say 'Claude', 'Claude Code', 'AI', 'LLM', 'analyzing', 'analysis'. Speak as a teammate: 'looking into this', 'pushed a fix', 'opened #N'.
            ═══════════════════════════════════════════════════════════════

            ═══════════════════════════════════════════════════════════════
            HARD RULES — violating these will break the repo
            ═══════════════════════════════════════════════════════════════
            1. NEVER push commits to the 'main' branch. Not even once. Not even for a tiny change.
            2. Before any 'git commit' or 'git push', you MUST first create a new branch with:
                 HEX=\$(openssl rand -hex 2)
                 BRANCH=\"elixpo/issue-<n>-\${HEX}\"   # or pr-<n>- for PR changes
                 git checkout -b \"\$BRANCH\"
               If you are editing an existing PR, check out that PR's branch first — never main.
            3. Every code change must go through a pull request. If you are on 'main', STOP and create a branch.
            4. Verify the branch before pushing: 'git rev-parse --abbrev-ref HEAD' must NOT print 'main'.

            ═══════════════════════════════════════════════════════════════
            EDITING RIGHTS — use them liberally
            ═══════════════════════════════════════════════════════════════
            ═══════════════════════════════════════════════════════════════
            AVAILABLE SUBAGENTS (from .claude/agents/)
            ═══════════════════════════════════════════════════════════════
            These specialized agents are pulled from elixpo/claudeOps.elixpo at runtime and are callable via the Task tool:

            - architect — system design, cross-cutting impact analysis
            - brancher — git branching / rebase strategy
            - breaker — adversarial edge-case probing
            - design-critic — UX / API shape review
            - fuzzer — input fuzzing / boundary analysis
            - judge — final go/no-go with tradeoff summary
            - prism — parallel-perspective analysis
            - questioner — produce clarifying questions for vague asks
            - red-team — security-focused adversarial review
            - refiner — tighten prose / PR descriptions / comments
            - researcher — deep investigation of a topic
            - specwriter — produce a spec from requirements
            - test-auditor — review test coverage + quality
            - ui-architect — UI structure and component breakdown
            - wirer — connect components / APIs

            Use them liberally for specialized tasks instead of doing everything yourself. Example:
            - @elixpoo asks 'review security on this PR' → delegate to red-team
            - Issue description vague → delegate to questioner
            - Writing PR description → delegate to refiner

            ═══════════════════════════════════════════════════════════════
            EDITING RIGHTS — use them liberally
            ═══════════════════════════════════════════════════════════════
            You have full write access to issues and PRs. As the conversation progresses, KEEP THE ISSUE/PR IN SYNC:

            - Edit the ISSUE body: 'gh issue edit <n> --body \"<new>\"'
                * Check off '- [ ]' checklist items as they are satisfied
                * Strike through answered questions using ~~tildes~~ (keep text visible for history)
                * Refine the Problem Statement when scope clarifies
            - Edit the ISSUE title: 'gh issue edit <n> --title \"<new>\"'
                * If the original title was vague and you now know what it's really about, rename it
            - Edit the PR body: 'gh pr edit <n> --body \"<new>\"'
                * Update the summary as changes are made
                * Check off items in the plan section
                * Add verification notes
            - Edit the PR title: 'gh pr edit <n> --title \"<new>\"'
                * Keep it accurate as scope evolves (prefixes: [ELIXPO], [fix], [feat], etc.)

            Always fetch the current body/title first before editing ('gh issue view <n> --json title,body' or 'gh pr view <n> --json title,body') and apply surgical edits — don't erase prior content, refine it.

            All GitHub side-effects happen as @elixpoo. You CAN push commits (to NON-main branches only).

            Identify which of these three modes you are in and follow the matching rules:

            ═══════════════════════════════════════════════════════════════
            MODE A — Mentioned in an ISSUE (not a PR)
            ═══════════════════════════════════════════════════════════════
            The user is asking questions, answering your earlier questions, or requesting action.

            Sub-mode A1 — User is answering your previous questions (no PR request):
              1. Update the issue body to reflect the new understanding:
                 - Check off any '- [ ]' items in '## Checklist' that are now satisfied.
                 - Strike through answered questions in '## Questions for @<user>' by wrapping in ~~double tildes~~ (keep the original text visible for history).
                 - Refine '## Problem Statement' and '## Todo's' with the clarified scope.
              2. Use 'gh issue view <n> --json title,body -q ...' to read current state, then 'gh issue edit <n> --body \"...\"' / '--title \"...\"'.
              3. Post a brief comment summarizing what you updated. Do NOT open a PR.

            Sub-mode A2 — User asks for code changes / a PR / a fix (e.g., 'please create a PR', 'go ahead and fix this', 'add X', 'change Y', 're-implement', 'redo', 'try again'):
              Any request that implies editing files goes here — even tiny ones.

              FIRST: check whether this issue already has PRs linked (from previous attempts).
                gh pr list --repo <owner>/<repo> --search \"linked:issue-<n>\" --state all --json number,state,headRefName,title
                # OR scan the issue timeline for 'Fixes #<n>' PRs.

              Handle the cases:
                - OPEN PR exists → switch to Mode B (work inside that PR, don't open a new one).
                - CLOSED/MERGED PR exists and user is asking to redo / re-implement / change scope →
                    Read the old PR's diff for context ('gh pr diff <old-pr>'), understand what was
                    previously attempted, then CREATE A NEW BRANCH and a NEW PR. Mention the old PR
                    in the new PR's body: 'Supersedes #<old-pr>.'
                - No PR exists → normal fresh flow.

              The flow is ALWAYS:

              Step 1 (BEFORE anything else): create a branch.
                HEX=\$(openssl rand -hex 2)
                BRANCH=\"elixpo/issue-<n>-\${HEX}\"
                git checkout -b \"\$BRANCH\"
                # Verify you are NOT on main:
                test \"\$(git rev-parse --abbrev-ref HEAD)\" != \"main\" || exit 1

              Step 1b: attach the ELIXPO label to the issue so the board reflects that the bot is working on it:
                gh issue edit <n> --add-label ELIXPO

              Step 2: post a short plan comment on the issue.
              Step 3: make the code changes.
              Step 4: run biome and fix any lint/format issues BEFORE committing:
                npx @biomejs/biome check . --write
                # If errors remain after --write, fix them by hand.
                npx @biomejs/biome ci .   # MUST exit 0 before commit.
              Step 5: commit and push to the branch:
                git add -A
                git commit -m \"<summary> (#<n>)\"
                git push -u origin \"\$BRANCH\"
              Step 6: open a READY (not draft) PR linked to the issue. Use EXACTLY this body format:
                BODY=\"Fixes #<n>

                ## Changes Made
                - <concrete bullet about change 1>
                - <concrete bullet about change 2>
                - <reference real file paths when relevant>

                ## Checklist
                - [ ] Code reviewed
                - [ ] Build passes
                - [ ] Tests pass (if applicable)
                - [ ] Docs updated (if behavior changed)

                ---
                cc @<issue-author> — opened by @elixpoo in response to issue #<n>.\"

                gh pr create --title \"[ELIXPO] <title>\" --body \"\$BODY\" --head \"\$BRANCH\" --base main
              Step 7: comment on the issue pointing to the new PR.

              Tag additional org members in 'cc' lines if their expertise is needed (frontend → @ez-vivek, docs → @anwe-ch).
              NEVER skip Step 1. NEVER commit to main, even if the change is 'just one line'.

            Sub-mode A3 — User is asking a question about the repo/issue:
              Answer in a single comment with specific, factual info. No PR, no edits to the issue body.

            ═══════════════════════════════════════════════════════════════
            MODE B — Mentioned in a PR (issue_comment on a PR, or PR review/review_comment)
            ═══════════════════════════════════════════════════════════════
            The PR is already open. Use its branch for any changes.

            Sub-mode B1 — User asks a question about the PR or project:
              Reply in a single comment on the PR. Reference specific lines/files. No code changes.

            Sub-mode B2 — User asks for a review:
              Post a structured review: Security / Logic / Quality / Verdict. Be direct. No code changes.

            Sub-mode B3 — User asks for changes or a new feature on this PR:
              1. Check out the PR's branch (you are already on it via the workflow checkout).
              2. Make the requested changes.
              3. Run biome and fix lint/format issues BEFORE committing:
                   npx @biomejs/biome check . --write
                   npx @biomejs/biome ci .   # MUST exit 0.
              4. Commit with a clear message and push to the same branch.
              5. Update the PR description if the scope changed: 'gh pr edit <n> --body \"...\"'.
              6. Post a single summary comment on the PR describing what you changed.

            Sub-mode B4 — User asks to fix a failing CI check / Action:
              You have 'actions: read' permission and can pull logs from any workflow run. Use this to diagnose and fix failures.

              1. Find the failing run. Options:
                 - User referenced a run URL or run ID explicitly → use that.
                 - User just says 'fix the failing biome check' / 'fix CI' → list recent runs on this PR:
                     gh run list --branch \"\$(gh pr view --json headRefName -q .headRefName)\" --limit 20
                     # Or filter by workflow name:
                     gh run list --workflow biome.yml --branch \"\$BRANCH\" --limit 5

              2. Read the logs of the failing run:
                     gh run view <run_id> --log-failed     # Only failed step output
                     gh run view <run_id> --log            # Full log
                     gh api repos/<owner>/<repo>/actions/runs/<run_id>/logs    # raw download if needed

              3. Parse the failure. Typical patterns:
                 - Biome: 'Found N errors' with file paths and rule names → run 'npx biome check <files>' locally to reproduce if needed.
                 - TypeScript: 'Type error: ...' with file:line — read the file around that line.
                 - Tests: stack traces pointing to spec files.
                 - Build: look for 'Error:' or the first non-zero exit.

              4. Fix the root cause on the PR branch. Prefer the minimal change that makes the check pass. Do NOT disable rules or add ignore comments unless the user explicitly asks.

              5. Commit and push to the PR branch. CI will re-run on push.

              6. Comment on the PR: 'Pushed fix for the <check> failure — <1-line explanation>. Re-running CI.' Reference the run you fixed: 'Related run: <url>'.

              If the failure is environmental (flaky test, runner issue, network) and not a code problem, say so and ask if the user wants you to rerun the job instead of patching code.

            ═══════════════════════════════════════════════════════════════
            Common rules
            ═══════════════════════════════════════════════════════════════
            - PRs you create are READY for review, never draft.
            - Always include 'Fixes #<issue>' in PRs that address an issue — this is how GitHub shows the PR in the issue's Development tab and closes the issue on merge.
            - Do NOT push to main. Do NOT merge PRs.
            - **Biome gate — ALWAYS run before every commit**: 'npx @biomejs/biome check . --write && npx @biomejs/biome ci .' must both exit 0. Fix remaining errors by hand if --write can't. This is non-negotiable.
            - Stay within the scope of what was asked. If you notice unrelated issues, mention them briefly but do not fix them.
            - Follow existing project conventions (biome config, tsconfig, neighbouring code style)."
          additional_permissions: |
            actions: read

      # ─────────────────────────────────────────────────────────────────
      # Post-guard: if the bot committed to a branch but didn't open a PR,
      # open one here. This ensures the PR always ends up in the issue's
      # Development tab (via "Fixes #N" in the body) regardless of whether
      # the model remembered to run `gh pr create`.
      # ─────────────────────────────────────────────────────────────────
      - name: Ensure PR exists for any new elixpo/* branch
        if: steps.whitelist.outputs.authorized == 'true' && github.event_name == 'issue_comment' && !github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -e

          # Find the most recent elixpo/* branch for this issue that does NOT
          # have an OPEN PR yet (closed / merged PRs are fine — we'll create
          # a new branch and PR to re-implement).
          BRANCHES=$(gh api "repos/$REPO/branches?per_page=100" --paginate \
            --jq ".[] | select(.name | startswith(\"elixpo/\") and contains(\"issue-$ISSUE_NUMBER\")) | .name")

          BRANCH=""
          for b in $BRANCHES; do
            OPEN_PR=$(gh pr list --repo "$REPO" --head "$b" --state open --json number --jq 'length')
            if [ "$OPEN_PR" = "0" ]; then
              BRANCH="$b"
              break
            fi
          done

          if [ -z "$BRANCH" ]; then
            echo "No elixpo/issue-$ISSUE_NUMBER-* branch without an open PR — nothing to do."
            exit 0
          fi
          echo "Found branch: $BRANCH (no open PR)"

          # Build PR body with Fixes #N so it attaches to the issue's Dev tab
          # Build bullet list from commit messages (first line of each)
          CHANGES=$(gh api "repos/$REPO/compare/main...$BRANCH" \
            --jq '.commits | map("- " + (.commit.message | split("\n")[0])) | join("\n")')

          # Get issue author for cc
          ISSUE_AUTHOR=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json author --jq '.author.login')

          PR_BODY=$(cat <<EOF
          Fixes #$ISSUE_NUMBER

          ## Changes Made
          $CHANGES

          ## Checklist
          - [ ] Code reviewed
          - [ ] Build passes
          - [ ] Tests pass (if applicable)
          - [ ] Docs updated (if behavior changed)

          ---
          cc @$ISSUE_AUTHOR — opened by @elixpoo in response to issue #$ISSUE_NUMBER.
          EOF
          )
          # Strip the leading 10-space indent introduced by the YAML heredoc.
          # Without this, every line starts with spaces and GitHub renders the
          # body as a code block, breaking "Fixes #N" auto-link.
          PR_BODY=$(printf '%s\n' "$PR_BODY" | sed 's/^          //')

          PR_URL=$(gh pr create --repo "$REPO" \
            --head "$BRANCH" --base main \
            --title "[ELIXPO] $ISSUE_TITLE" \
            --body "$PR_BODY")
          echo "Opened PR: $PR_URL"

          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
            --body "Opened #$PR_NUM with the changes."

          # Attach the ELIXPO label so the board reflects bot involvement.
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label ELIXPO || true

      # ─────────────────────────────────────────────────────────────────
      # Failure fallback: if claude-code-action or any preceding step
      # errored, post a blockquote pointing to the failing run so the
      # user knows what happened.
      # ─────────────────────────────────────────────────────────────────
      - name: Post failure notice
        if: failure() && steps.whitelist.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e

          MSG=$(cat <<EOF
          > ⚠️ Something went wrong on my end while handling this.

          **What you can do:**

          <kbd>🔄 [**Re-run this workflow**]($RUN_URL)</kbd> &nbsp;·&nbsp; [View logs]($RUN_URL) &nbsp;·&nbsp; Or comment \`@elixpoo retry\` once the cause is fixed

          <sub>Run ID: \`$RUN_ID\`</sub>
          EOF
          )

          if [[ "${{ github.event_name }}" == "issue_comment" ]] || [[ "${{ github.event_name }}" == "issues" ]]; then
            gh issue comment "${{ github.event.issue.number }}" --repo "$REPO" --body "$MSG"
          elif [[ "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            gh pr comment "${{ github.event.pull_request.number }}" --repo "$REPO" --body "$MSG"
          elif [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            gh pr comment "${{ github.event.pull_request.number }}" --repo "$REPO" --body "$MSG"
          fi
