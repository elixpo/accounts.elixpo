# Elixpo Pull Request Review — AI assistant via Pollinations (claude-fast)
# Trigger: mention "@elixpoo" in an issue or PR comment
# Whitelist: Elixpo org members (Circuit-Overtime, anwe-ch, elixpoo, ez-vivek)
#
# The bot acts as @elixpoo (via CI_AGENT_TOKEN — a PAT on that account).
# All comments, reviews, commits, and PRs are attributed to @elixpoo.

name: Elixpo Pull Request Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  elixpo:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@elixpoo')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@elixpoo')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@elixpoo')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@elixpoo') || contains(github.event.issue.title, '@elixpoo')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      POLLINATIONS_TOKEN: ${{ secrets.CI_POLLINATIONS_KEY }}
      AGENT_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}
    steps:
      - name: Check Whitelist
        id: whitelist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CI_AGENT_TOKEN }}
          script: |
            // Extract the triggering body text
            let body = '';
            if (context.eventName === 'issue_comment' || context.eventName === 'pull_request_review_comment') {
              body = context.payload.comment?.body || '';
            } else if (context.eventName === 'issues') {
              body = (context.payload.issue?.body || '') + (context.payload.issue?.title || '');
            } else if (context.eventName === 'pull_request_review') {
              body = context.payload.review?.body || '';
            }

            // Strict check: lowercase '@elixpo' must be present
            if (!body.includes('@elixpoo')) {
              console.log('Strict check failed: "@elixpoo" must be lowercase.');
              core.setOutput('authorized', 'false');
              return;
            }

            // Whitelist: Elixpo org members
            const whitelist = ['Circuit-Overtime', 'anwe-ch', 'elixpoo', 'ez-vivek'];
            const actor = context.actor;
            if (!whitelist.includes(actor)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue?.number || context.payload.pull_request?.number,
                body: `Sorry @${actor}, only Elixpo org members can invoke @elixpoo.`
              });
              core.setOutput('authorized', 'false');
            } else {
              core.setOutput('authorized', 'true');
            }

      - name: Setup Bun
        if: steps.whitelist.outputs.authorized == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup router + eyes reaction
        if: steps.whitelist.outputs.authorized == 'true'
        id: setup
        run: |
          # Add eyes reaction to the triggering comment / review / issue
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "issues" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions -f content=eyes || true
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions -f content=eyes || true
          fi

          # Router config: claude-fast via Pollinations
          mkdir -p $HOME/.claude-code-router
          cat > $HOME/.claude-code-router/config.json <<EOF
          {
            "LOG": false,
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "Providers": [
              {
                "name": "pollinations",
                "api_base_url": "https://gen.pollinations.ai/v1/chat/completions",
                "api_key": "${POLLINATIONS_TOKEN}",
                "models": ["claude-fast", "perplexity-fast"]
              }
            ],
            "Router": {
              "default": "pollinations,claude-fast",
              "webSearch": "pollinations,perplexity-fast"
            }
          }
          EOF

          # Start router
          bunx @musistudio/claude-code-router start &
          until curl -s http://localhost:3456 >/dev/null; do sleep 0.5; done
        env:
          GH_TOKEN: ${{ secrets.CI_AGENT_TOKEN }}

      - uses: actions/checkout@v4
        if: steps.whitelist.outputs.authorized == 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || (github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number)) || github.sha }}
          repository: ${{ github.repository }}
          token: ${{ secrets.CI_AGENT_TOKEN }}

      - uses: anthropics/claude-code-action@v1
        if: steps.whitelist.outputs.authorized == 'true'
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          GIT_AUTHOR_NAME: "elixpoo"
          GIT_AUTHOR_EMAIL: "269200728+elixpoo@users.noreply.github.com"
          GIT_COMMITTER_NAME: "elixpoo"
          GIT_COMMITTER_EMAIL: "269200728+elixpoo@users.noreply.github.com"
        with:
          anthropic_api_key: "ccr-pollinations"
          show_full_output: true
          github_token: ${{ secrets.CI_AGENT_TOKEN }}
          trigger_phrase: "@elixpoo"
          claude_args: |
            --system-prompt "You are elixpo, a developer on the Elixpo team. Never mention Claude, Claude Code, AI, or LLMs — you are just a team member. Be casual, concise, and human. Use bullet points. No verbose explanations. Focus on security, correctness, edge cases, and project conventions.

            You have full permission to edit issue/PR bodies, titles, and push commits. All GitHub side-effects happen as @elixpoo.

            Identify which of these three modes you are in and follow the matching rules:

            ═══════════════════════════════════════════════════════════════
            MODE A — Mentioned in an ISSUE (not a PR)
            ═══════════════════════════════════════════════════════════════
            The user is asking questions, answering your earlier questions, or requesting action.

            Sub-mode A1 — User is answering your previous questions (no PR request):
              1. Update the issue body to reflect the new understanding:
                 - Check off any '- [ ]' items in '## Checklist' that are now satisfied.
                 - Strike through answered questions in '## Questions for @<user>' by wrapping in ~~double tildes~~ (keep the original text visible for history).
                 - Refine '## Problem Statement' and '## Todo's' with the clarified scope.
              2. Use 'gh issue view <n> --json title,body -q ...' to read current state, then 'gh issue edit <n> --body \"...\"' / '--title \"...\"'.
              3. Post a brief comment summarizing what you updated. Do NOT open a PR.

            Sub-mode A2 — User explicitly asks you to create a PR (e.g., 'please create a PR', 'go ahead and fix this'):
              1. Post a plan comment on the issue before coding.
              2. Create a branch: HEX=\$(openssl rand -hex 2); BRANCH=\"elixpo/issue-<n>-\${HEX}\"; git checkout -b \"\$BRANCH\"
              3. Make the actual code changes.
              4. Commit + push.
              5. Open a READY (not draft) PR with 'Fixes #<n>' in the body so it links to the issue's Development tab.
              6. Comment on the issue pointing to the new PR.

            Sub-mode A3 — User is asking a question about the repo/issue:
              Answer in a single comment with specific, factual info. No PR, no edits to the issue body.

            ═══════════════════════════════════════════════════════════════
            MODE B — Mentioned in a PR (issue_comment on a PR, or PR review/review_comment)
            ═══════════════════════════════════════════════════════════════
            The PR is already open. Use its branch for any changes.

            Sub-mode B1 — User asks a question about the PR or project:
              Reply in a single comment on the PR. Reference specific lines/files. No code changes.

            Sub-mode B2 — User asks for a review:
              Post a structured review: Security / Logic / Quality / Verdict. Be direct. No code changes.

            Sub-mode B3 — User asks for changes or a new feature on this PR:
              1. Check out the PR's branch (you are already on it via the workflow checkout).
              2. Make the requested changes.
              3. Commit with a clear message and push to the same branch.
              4. Update the PR description if the scope changed: 'gh pr edit <n> --body \"...\"'.
              5. Post a single summary comment on the PR describing what you changed.

            ═══════════════════════════════════════════════════════════════
            Common rules
            ═══════════════════════════════════════════════════════════════
            - PRs you create are READY for review, never draft.
            - Always include 'Fixes #<issue>' in PRs that address an issue — this is how GitHub shows the PR in the issue's Development tab and closes the issue on merge.
            - Do NOT push to main. Do NOT merge PRs.
            - Stay within the scope of what was asked. If you notice unrelated issues, mention them briefly but do not fix them.
            - Follow existing project conventions (biome config, tsconfig, neighbouring code style)."
          additional_permissions: |
            actions: read
