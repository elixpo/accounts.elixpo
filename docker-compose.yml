version: '3.8'

services:
  # ─── Elixpo Accounts App ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elixpo-accounts
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-15}
      REFRESH_TOKEN_EXPIRATION_DAYS: ${REFRESH_TOKEN_EXPIRATION_DAYS:-30}
      # Cloudflare D1
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_DATABASE_ID: ${CLOUDFLARE_DATABASE_ID}
      # App URLs
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://accounts.elixpo.com}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://accounts.elixpo.com/api}
      # OAuth Providers
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NEXT_PUBLIC_GITHUB_CLIENT_ID: ${NEXT_PUBLIC_GITHUB_CLIENT_ID:-}
      # Email — Zoho SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.zoho.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-accounts@elixpo.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Elixpo Accounts}
      SMTP_PASS: ${SMTP_PASS:-}
      # Rate limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://accounts.elixpo.com}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - elixpo-net

networks:
  elixpo-net:
    driver: bridge
